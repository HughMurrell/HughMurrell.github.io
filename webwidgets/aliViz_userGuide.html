<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>aliViz User Guide</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; max-width: 980px; margin: 24px auto; padding: 0 16px; line-height: 1.5; }
    code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    pre { padding: 12px; background: #f6f8fa; overflow: auto; }
  </style>
</head>
<body>
  <div id="content">Loading…</div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    fetch('aliViz_userGuide.md')
      .then(r => r.text())
      .then(md => { document.getElementById('content').innerHTML = marked.parse(md); })
      .catch(err => { document.getElementById('content').textContent = String(err); });
  </script>
</body>
</html>
